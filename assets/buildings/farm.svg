<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <linearGradient id="wb" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#a87830"/><stop offset="0.6" stop-color="#c89848"/><stop offset="1" stop-color="#886018"/></linearGradient>
    <linearGradient id="rf" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#8a7020"/><stop offset="1" stop-color="#6a5010"/></linearGradient>
  </defs>
  <ellipse cx="34" cy="62" rx="30" ry="5" fill="#00000038"/>
  <!-- hay bales -->
  <ellipse cx="6" cy="52" rx="7" ry="6" fill="#d4b040"/>
  <ellipse cx="6" cy="52" rx="7" ry="6" stroke="#a08020" stroke-width="1" fill="none"/>
  <ellipse cx="58" cy="52" rx="7" ry="6" fill="#d4b040"/>
  <ellipse cx="58" cy="52" rx="7" ry="6" stroke="#a08020" stroke-width="1" fill="none"/>
  <!-- roof -->
  <polygon points="32,4 2,28 62,28" fill="url(#rf)"/>
  <polygon points="32,4 56,28 62,28" fill="#00000022"/>
  <!-- wall (wooden planks) -->
  <rect x="6" y="28" width="52" height="30" fill="url(#wb)"/>
  <rect x="44" y="28" width="14" height="30" fill="#00000018"/>
  <!-- plank lines -->
  <line x1="6" y1="35" x2="58" y2="35" stroke="#7a5010" stroke-width="1" opacity="0.6"/>
  <line x1="6" y1="43" x2="58" y2="43" stroke="#7a5010" stroke-width="1" opacity="0.6"/>
  <line x1="6" y1="51" x2="58" y2="51" stroke="#7a5010" stroke-width="1" opacity="0.6"/>
  <!-- barn doors (double) -->
  <rect x="22" y="36" width="20" height="22" fill="#5a3810"/>
  <line x1="32" y1="36" x2="32" y2="58" stroke="#3a2008" stroke-width="1.5"/>
  <line x1="24" y1="44" x2="30" y2="44" stroke="#7a5820" stroke-width="1"/>
  <line x1="34" y1="44" x2="40" y2="44" stroke="#7a5820" stroke-width="1"/>
  <!-- wheat stalks -->
  <line x1="11" y1="20" x2="11" y2="10" stroke="#b09030" stroke-width="1.5"/>
  <rect x="9" y="8" width="5" height="7" rx="1" fill="#d4aa20"/>
  <line x1="17" y1="20" x2="17" y2="9" stroke="#b09030" stroke-width="1.5"/>
  <rect x="15" y="7" width="5" height="7" rx="1" fill="#d4aa20"/>
</svg>