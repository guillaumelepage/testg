<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96">
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#8c7e72"/><stop offset="0.6" stop-color="#b0a090"/><stop offset="1" stop-color="#6e6258"/></linearGradient>
    <linearGradient id="rf" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#2e1a0a"/><stop offset="1" stop-color="#4e2e14"/></linearGradient>
    <linearGradient id="tw" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#7a6e64"/><stop offset="1" stop-color="#a09088"/></linearGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="50" cy="93" rx="44" ry="6" fill="#00000045"/>
  <!-- left tower body -->
  <rect x="3" y="28" width="20" height="60" fill="url(#tw)"/>
  <!-- right tower body -->
  <rect x="73" y="28" width="20" height="60" fill="url(#tw)"/>
  <!-- main keep wall -->
  <rect x="18" y="38" width="60" height="50" fill="url(#wall)"/>
  <!-- stone mortar lines -->
  <line x1="18" y1="50" x2="78" y2="50" stroke="#6a5e54" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="62" x2="78" y2="62" stroke="#6a5e54" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="74" x2="78" y2="74" stroke="#6a5e54" stroke-width="0.8" opacity="0.5"/>
  <line x1="36" y1="38" x2="36" y2="88" stroke="#6a5e54" stroke-width="0.6" opacity="0.4"/>
  <line x1="54" y1="38" x2="54" y2="88" stroke="#6a5e54" stroke-width="0.6" opacity="0.4"/>
  <!-- right face shading -->
  <rect x="66" y="38" width="12" height="50" fill="#00000022"/>
  <!-- main roof -->
  <polygon points="48,4 10,38 86,38" fill="url(#rf)"/>
  <polygon points="48,4 78,38 86,38" fill="#00000020"/>
  <!-- tower conical roofs -->
  <polygon points="13,8 23,28 3,28" fill="#4a2e14"/>
  <polygon points="83,8 93,28 73,28" fill="#4a2e14"/>
  <!-- crenellations keep -->
  <rect x="18" y="33" width="6" height="7" fill="#6e6258"/><rect x="28" y="33" width="6" height="7" fill="#6e6258"/>
  <rect x="38" y="33" width="6" height="7" fill="#6e6258"/><rect x="48" y="33" width="6" height="7" fill="#6e6258"/>
  <rect x="58" y="33" width="6" height="7" fill="#6e6258"/><rect x="68" y="33" width="6" height="7" fill="#6e6258"/>
  <!-- crenellations towers -->
  <rect x="3" y="23" width="4" height="6" fill="#5e5450"/><rect x="10" y="23" width="4" height="6" fill="#5e5450"/><rect x="17" y="23" width="4" height="6" fill="#5e5450"/>
  <rect x="73" y="23" width="4" height="6" fill="#5e5450"/><rect x="80" y="23" width="4" height="6" fill="#5e5450"/><rect x="87" y="23" width="4" height="6" fill="#5e5450"/>
  <!-- flag pole -->
  <line x1="48" y1="4" x2="48" y2="-6" stroke="#5a3010" stroke-width="2"/>
  <polygon points="48,-6 64,0 48,6" fill="#cc1111"/>
  <!-- gate -->
  <rect x="39" y="66" width="18" height="22" fill="#1a0c04"/>
  <path d="M39,66 Q48,58 57,66" fill="#1a0c04"/>
  <!-- portcullis lines -->
  <line x1="43" y1="66" x2="43" y2="88" stroke="#3a2010" stroke-width="1.2" opacity="0.7"/>
  <line x1="48" y1="66" x2="48" y2="88" stroke="#3a2010" stroke-width="1.2" opacity="0.7"/>
  <line x1="53" y1="66" x2="53" y2="88" stroke="#3a2010" stroke-width="1.2" opacity="0.7"/>
  <line x1="39" y1="76" x2="57" y2="76" stroke="#3a2010" stroke-width="1" opacity="0.7"/>
  <!-- windows -->
  <rect x="22" y="46" width="10" height="14" rx="1" fill="#ffe8a0"/>
  <rect x="64" y="46" width="10" height="14" rx="1" fill="#ffe8a0"/>
  <line x1="27" y1="46" x2="27" y2="60" stroke="#8a6020" stroke-width="1"/>
  <line x1="22" y1="53" x2="32" y2="53" stroke="#8a6020" stroke-width="1"/>
  <line x1="69" y1="46" x2="69" y2="60" stroke="#8a6020" stroke-width="1"/>
  <line x1="64" y1="53" x2="74" y2="53" stroke="#8a6020" stroke-width="1"/>
  <!-- tower arrow slits -->
  <rect x="10" y="38" width="5" height="12" rx="1" fill="#111"/>
  <rect x="81" y="38" width="5" height="12" rx="1" fill="#111"/>
</svg>