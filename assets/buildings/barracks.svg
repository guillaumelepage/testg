  <line x1="6" y1="42" x2="58" y2="42" stroke="#4a4840" stroke-width="0.8" opacity="0.6"/>
  <line x1="22" y1="20" x2="22" y2="58" stroke="#4a4840" stroke-width="0.7" opacity="0.5"/>
  <line x1="40" y1="20" x2="40" y2="58" stroke="#4a4840" stroke-width="0.7" opacity="0.5"/>
  <!-- crenellations top -->
  <rect x="6"  y="14" width="7" height="8" fill="#5a5450"/><rect x="16" y="14" width="7" height="8" fill="#5a5450"/>
  <rect x="26" y="14" width="7" height="8" fill="#5a5450"/><rect x="36" y="14" width="7" height="8" fill="#5a5450"/>
  <rect x="46" y="14" width="7" height="8" fill="#5a5450"/>
  <!-- arrow slits -->
  <rect x="12" y="24" width="4" height="14" rx="1" fill="#111"/>
  <rect x="30" y="24" width="4" height="14" rx="1" fill="#111"/>
  <rect x="48" y="24" width="4" height="14" rx="1" fill="#111"/>
