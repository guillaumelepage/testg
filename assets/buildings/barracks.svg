  <line x1="28" y1="38" x2="28" y2="58" stroke="#3a2010" stroke-width="1.5"/>
  <line x1="32" y1="38" x2="32" y2="58" stroke="#3a2010" stroke-width="1.5"/>
  <line x1="36" y1="38" x2="36" y2="58" stroke="#3a2010" stroke-width="1.5"/>
  <!-- crossed swords emblem -->
  <line x1="30" y1="30" x2="38" y2="36" stroke="#cc2222" stroke-width="2"/>
  <line x1="38" y1="30" x2="30" y2="36" stroke="#cc2222" stroke-width="2"/>
  <line x1="30" y1="33" x2="38" y2="33" stroke="#cc2222" stroke-width="1.2"/>
