<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <linearGradient id="st" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#6e6860"/><stop offset="0.6" stop-color="#8e8880"/><stop offset="1" stop-color="#505048"/></linearGradient>
  </defs>
  <ellipse cx="34" cy="62" rx="28" ry="5" fill="#00000040"/>
  <!-- flat roof with crenellations -->
