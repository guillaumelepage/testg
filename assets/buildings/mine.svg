<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <linearGradient id="rock" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#605850"/><stop offset="0.6" stop-color="#807870"/><stop offset="1" stop-color="#484038"/></linearGradient>
  </defs>
  <ellipse cx="34" cy="62" rx="28" ry="5" fill="#00000045"/>
  <!-- rocky roof -->
  <polygon points="32,6 2,28 62,28" fill="#4a4038"/>
  <polygon points="32,6 58,28 62,28" fill="#00000028"/>
  <!-- rock face wall -->
  <rect x="6" y="28" width="52" height="30" fill="url(#rock)"/>
  <rect x="46" y="28" width="12" height="30" fill="#00000022"/>
  <!-- crack details -->
  <polyline points="14,32 20,44 16,56" stroke="#3a3028" stroke-width="1.2" fill="none" opacity="0.7"/>
  <polyline points="38,30 42,40" stroke="#3a3028" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- mine entrance arch -->
  <rect x="24" y="38" width="16" height="20" fill="#100c04"/>
  <path d="M24,38 Q32,30 40,38" fill="#100c04"/>
  <!-- timber frame -->
  <line x1="22" y1="58" x2="22" y2="36" stroke="#8a6020" stroke-width="2.5"/>
  <line x1="42" y1="58" x2="42" y2="36" stroke="#8a6020" stroke-width="2.5"/>
  <line x1="21" y1="37" x2="43" y2="37" stroke="#8a6020" stroke-width="2.5"/>
  <!-- pickaxe icon -->
  <line x1="10" y1="14" x2="20" y2="24" stroke="#c8960c" stroke-width="2"/>
  <line x1="9" y1="14" x2="15" y2="8" stroke="#c8960c" stroke-width="2"/>
  <line x1="15" y1="8" x2="20" y2="14" stroke="#c8960c" stroke-width="1.5"/>
  <!-- gold glint -->
  <circle cx="30" cy="46" r="2" fill="#ffd700" opacity="0.7"/>
  <circle cx="35" cy="50" r="1.5" fill="#ffd700" opacity="0.6"/>
</svg>