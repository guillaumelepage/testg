<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <defs>
    <filter id="n" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="7" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComponentTransfer in="b">
        <feFuncR type="linear" slope="1.08" intercept="-0.04"/>
        <feFuncG type="linear" slope="1.08" intercept="-0.04"/>
        <feFuncB type="linear" slope="1.08" intercept="-0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="48" height="48" fill="#396628"/>
  <rect width="24" height="24" fill="#2e5a20" opacity="0.55"/>
  <rect x="24" y="24" width="24" height="24" fill="#2e5a20" opacity="0.55"/>
  <rect x="12" y="12" width="24" height="24" fill="#4a7a32" opacity="0.40"/>
  <rect width="48" height="48" filter="url(#n)" opacity="0.50"/>
</svg>