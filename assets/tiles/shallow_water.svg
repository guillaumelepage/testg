<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <defs>
    <filter id="nsw" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="77" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <!-- Sandy bottom -->
  <rect width="48" height="48" fill="#b8ac68"/>
  <!-- Shallow water overlay -->
  <rect width="48" height="48" fill="#60a8cc" opacity="0.62"/>
  <!-- Sandy patches visible through water -->
  <ellipse cx="10" cy="10" rx="8" ry="5" fill="#c8b870" opacity="0.52"/>
  <ellipse cx="38" cy="38" rx="8" ry="5" fill="#c8b870" opacity="0.52"/>
  <ellipse cx="30" cy="16" rx="5" ry="3" fill="#c8b870" opacity="0.38"/>
  <!-- Water highlight -->
  <rect width="24" height="24" fill="#90c8e0" opacity="0.32"/>
  <!-- Gentle ripples -->
  <rect x="3"  y="22" width="14" height="2" rx="1" fill="#a8d4e8" opacity="0.8"/>
  <rect x="26" y="14" width="18" height="2" rx="1" fill="#a8d4e8" opacity="0.8"/>
  <rect x="8"  y="36" width="20" height="2" rx="1" fill="#a8d4e8" opacity="0.7"/>
  <rect x="30" y="30" width="14" height="2" rx="1" fill="#a8d4e8" opacity="0.7"/>
  <!-- Small foam dots -->
  <circle cx="12" cy="28" r="1.5" fill="#c8e4f0" opacity="0.7"/>
  <circle cx="38" cy="20" r="1.5" fill="#c8e4f0" opacity="0.7"/>
  <!-- Noise -->
  <rect width="48" height="48" filter="url(#nsw)" opacity="0.28"/>
</svg>