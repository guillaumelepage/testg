<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <defs>
    <filter id="nsnow" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" seed="89" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <!-- Ground: dark grey-green base -->
  <rect width="48" height="48" fill="#2a4030"/>
  <!-- Back peak (cold stone) -->
  <polygon points="36,10 48,44 46,44" fill="#3a4a56"/>
  <polygon points="36,10 36,44 48,44" fill="#6878a0"/>
  <!-- Main peak shadow face -->
  <polygon points="22,2 2,44 44,44" fill="#3a4a56"/>
  <!-- Main peak lit face -->
  <polygon points="24,2 24,44 44,44" fill="#7888a8"/>
  <!-- Snow cap — covers most of peak -->
  <polygon points="22,2 6,30 38,30"  fill="#d8e4f0"/>
  <polygon points="22,2 12,22 32,22" fill="#eaf0f8"/>
  <polygon points="22,2 18,14 26,14" fill="#ffffff" opacity="0.85"/>
  <!-- Ice glints -->
  <line x1="15" y1="22" x2="13" y2="28" stroke="#b8d0e8" stroke-width="1" opacity="0.75"/>
  <line x1="29" y1="20" x2="31" y2="26" stroke="#b8d0e8" stroke-width="1" opacity="0.75"/>
  <!-- Dark shadow on left edge -->
  <polygon points="22,2 2,44 6,44" fill="#1e2a38" opacity="0.45"/>
  <!-- Snow drift at base -->
  <ellipse cx="24" cy="44" rx="22" ry="5" fill="#d8e4f0" opacity="0.5"/>
  <!-- Noise -->
  <rect width="48" height="48" filter="url(#nsnow)" opacity="0.18"/>
</svg>