<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <defs>
    <filter id="nrn" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="97" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <!-- Mossy dark ground -->
  <rect width="48" height="48" fill="#374e22"/>
  <rect x="0" y="30" width="48" height="18" fill="#253616" opacity="0.5"/>
  <!-- Left wall section (broken, angled) -->
  <rect x="2" y="8"  width="14" height="8" rx="1" fill="#787068" transform="rotate(-4 2 8)"/>
  <rect x="2" y="8"  width="14" height="4" rx="1" fill="#585050" opacity="0.45" transform="rotate(-4 2 8)"/>
  <!-- Top fallen block -->
  <rect x="24" y="4" width="18" height="7" rx="1" fill="#787068" transform="rotate(5 24 4)"/>
  <rect x="24" y="4" width="18" height="3" rx="1" fill="#585050" opacity="0.4" transform="rotate(5 24 4)"/>
  <!-- Right section collapsed -->
  <rect x="30" y="22" width="16" height="9" rx="1" fill="#6a6260" transform="rotate(-8 30 22)"/>
  <!-- Rubble chunks -->
  <polygon points="10,32 18,28 22,36 14,40" fill="#6a6260"/>
  <polygon points="10,32 14,28 18,32" fill="#8a8280"/>
  <polygon points="6,40 12,36 16,44 8,46"  fill="#5a5250"/>
  <polygon points="6,40 10,36 12,40"  fill="#7a7270"/>
  <circle cx="36" cy="38" r="5" fill="#6a6260"/>
  <circle cx="35" cy="37" r="3" fill="#8a8280" opacity="0.6"/>
  <!-- Grass growing through cracks -->
  <line x1="16" y1="14" x2="14" y2="7"  stroke="#4a7230" stroke-width="1.5" opacity="0.9"/>
  <line x1="18" y1="14" x2="20" y2="6"  stroke="#4a7230" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="34" x2="30" y2="26" stroke="#4a7230" stroke-width="1.2" opacity="0.8"/>
  <line x1="34" y1="34" x2="36" y2="26" stroke="#4a7230" stroke-width="1.2" opacity="0.8"/>
  <line x1="22" y1="24" x2="21" y2="18" stroke="#5a8838" stroke-width="1.2" opacity="0.7"/>
  <!-- Noise -->
  <rect width="48" height="48" filter="url(#nrn)" opacity="0.4"/>
</svg>