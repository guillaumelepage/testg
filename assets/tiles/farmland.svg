<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <defs>
    <filter id="nfl" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="113" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <!-- Plowed earth base -->
  <rect width="48" height="48" fill="#7a5834"/>
  <!-- Furrow ridges (lighter) -->
  <rect x="0" y="1"  width="48" height="5" fill="#9a7050" opacity="0.85"/>
  <rect x="0" y="9"  width="48" height="5" fill="#9a7050" opacity="0.85"/>
  <rect x="0" y="17" width="48" height="5" fill="#9a7050" opacity="0.85"/>
  <rect x="0" y="25" width="48" height="5" fill="#9a7050" opacity="0.85"/>
  <rect x="0" y="33" width="48" height="5" fill="#9a7050" opacity="0.85"/>
  <rect x="0" y="41" width="48" height="5" fill="#9a7050" opacity="0.85"/>
  <!-- Furrow troughs (darker) -->
  <rect x="0" y="6"  width="48" height="3" fill="#5a3820" opacity="0.7"/>
  <rect x="0" y="14" width="48" height="3" fill="#5a3820" opacity="0.7"/>
  <rect x="0" y="22" width="48" height="3" fill="#5a3820" opacity="0.7"/>
  <rect x="0" y="30" width="48" height="3" fill="#5a3820" opacity="0.7"/>
  <rect x="0" y="38" width="48" height="3" fill="#5a3820" opacity="0.7"/>
  <rect x="0" y="46" width="48" height="2" fill="#5a3820" opacity="0.7"/>
  <!-- Young sprouts along ridges -->
  <rect x="4"  y="0"  width="2" height="6" rx="1" fill="#68c040" opacity="0.9"/>
  <rect x="10" y="0"  width="2" height="6" rx="1" fill="#68c040" opacity="0.9"/>
  <rect x="18" y="0"  width="2" height="5" rx="1" fill="#68c040" opacity="0.8"/>
  <rect x="26" y="0"  width="2" height="6" rx="1" fill="#78d050" opacity="0.85"/>
  <rect x="36" y="0"  width="2" height="5" rx="1" fill="#68c040" opacity="0.9"/>
  <rect x="44" y="0"  width="2" height="6" rx="1" fill="#68c040" opacity="0.8"/>
  <rect x="6"  y="8"  width="2" height="6" rx="1" fill="#68c040" opacity="0.8"/>
  <rect x="14" y="8"  width="2" height="6" rx="1" fill="#78d050" opacity="0.85"/>
  <rect x="22" y="8"  width="2" height="5" rx="1" fill="#68c040" opacity="0.8"/>
  <rect x="32" y="8"  width="2" height="6" rx="1" fill="#68c040" opacity="0.9"/>
  <rect x="42" y="8"  width="2" height="5" rx="1" fill="#78d050" opacity="0.8"/>
  <rect x="4"  y="16" width="2" height="6" rx="1" fill="#78d050" opacity="0.9"/>
  <rect x="16" y="16" width="2" height="5" rx="1" fill="#68c040" opacity="0.8"/>
  <rect x="28" y="16" width="2" height="6" rx="1" fill="#68c040" opacity="0.9"/>
  <rect x="40" y="16" width="2" height="5" rx="1" fill="#78d050" opacity="0.85"/>
  <!-- Noise -->
  <rect width="48" height="48" filter="url(#nfl)" opacity="0.38"/>
</svg>