<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <defs>
    <filter id="nf" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="5" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <!-- ground -->
  <rect width="48" height="48" fill="#3a7028"/>
  <rect x="0" y="28" width="48" height="20" fill="#1c3c10"/>
  <!-- trunk -->
  <rect x="21" y="30" width="7" height="14" fill="#6b3e18"/>
  <rect x="21" y="30" width="3" height="14" fill="#4a2a10"/>
  <!-- canopy layers back→front -->
  <circle cx="32" cy="30" r="10" fill="#224e14"/>
  <circle cx="16" cy="28" r="11" fill="#224e14"/>
  <circle cx="28" cy="24" r="13" fill="#316620"/>
  <circle cx="19" cy="22" r="12" fill="#316620"/>
  <circle cx="24" cy="18" r="13" fill="#42802c"/>
  <circle cx="21" cy="14" r="8"  fill="#5a9a38" opacity="0.7"/>
  <!-- pine tip -->
  <polygon points="24,4 17,18 31,18" fill="#316620"/>
  <polygon points="24,6 20,16 28,16" fill="#42802c"/>
  <!-- noise -->
  <rect width="48" height="48" filter="url(#nf)" opacity="0.3"/>
</svg>