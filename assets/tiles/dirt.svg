<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <defs>
    <filter id="nd" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="31" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>
  <!-- base -->
  <rect width="48" height="48" fill="#a07850"/>
  <!-- dark patches -->
  <rect x="0"  y="0"  width="14" height="16" fill="#7a5830" opacity="0.7"/>
  <rect x="28" y="24" width="20" height="16" fill="#7a5830" opacity="0.7"/>
  <rect x="6"  y="34" width="16" height="14" fill="#7a5830" opacity="0.7"/>
  <!-- light patches -->
  <rect x="16" y="4"  width="18" height="12" fill="#c09868" opacity="0.6"/>
  <rect x="2"  y="22" width="14" height="10" fill="#c09868" opacity="0.6"/>
  <rect x="34" y="6"  width="14" height="18" fill="#c09868" opacity="0.6"/>
  <!-- crack lines -->
  <polyline points="10,10 20,22 16,36" stroke="#7a5830" stroke-width="1" fill="none" opacity="0.7"/>
  <polyline points="30,4 38,18"        stroke="#7a5830" stroke-width="1" fill="none" opacity="0.6"/>
  <polyline points="6,40 22,44"        stroke="#7a5830" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- pebbles -->
  <circle cx="12" cy="14" r="2" fill="#7a5830"/>
  <circle cx="34" cy="28" r="2" fill="#7a5830"/>
  <circle cx="8"  cy="36" r="2" fill="#7a5830"/>
  <circle cx="40" cy="12" r="2" fill="#7a5830"/>
  <circle cx="24" cy="38" r="2" fill="#7a5830"/>
  <!-- noise -->
  <rect width="48" height="48" filter="url(#nd)" opacity="0.4"/>
</svg>