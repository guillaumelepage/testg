<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96">
  <!-- hero glow -->
  <circle cx="48" cy="48" r="46" fill="none" stroke="#ffd700" stroke-width="4" opacity="0.40"/>
  <ellipse cx="52" cy="91" rx="29" ry="6" fill="#00000030"/>
  <!-- royal sword behind body -->
  <line x1="64" y1="26" x2="80" y2="88" stroke="#e0e0e0" stroke-width="9"/>
  <rect x="59" y="52" width="23" height="5" rx="1" fill="#ffd700"/>
  <circle cx="80" cy="88" r="6" fill="#ffd700"/>
  <rect x="65" y="26" width="3" height="22" fill="#ffffff" opacity="0.4"/>
  <!-- gold armour body -->
  <rect x="28" y="30" width="38" height="44" rx="4" fill="#b8860b"/>
  <rect x="28" y="30" width="12" height="44" fill="#ffffff" opacity="0.16"/>
  <!-- pauldrons (shoulders) -->
  <rect x="28" y="30" width="38" height="6" fill="#ffd700"/>
  <!-- tassets (waist) -->
  <rect x="28" y="62" width="38" height="5" fill="#ffd700"/>
  <!-- heraldry cross -->
  <rect x="44" y="37" width="8" height="23" fill="#7a5500"/>
  <rect x="36" y="46" width="23" height="7" fill="#7a5500"/>
  <!-- royal helmet -->
  <circle cx="48" cy="22" r="17" fill="#b8860b"/>
  <circle cx="48" cy="22" r="17" fill="none" stroke="#ffd700" stroke-width="3"/>
  <rect x="34" y="18" width="27" height="8" rx="1" fill="#7a5500"/>
  <!-- crown -->
  <rect x="34" y="2" width="27" height="9" fill="#ffd700"/>
  <polygon points="34,2 37,2 35.5,11" fill="#ffd700"/>
  <polygon points="48,2 48,-7 51,2" fill="#ffd700"/>
  <polygon points="62,2 59,2 60.5,11" fill="#ffd700"/>
  <!-- crown jewels -->
  <circle cx="48" cy="3" r="3" fill="#cc2222"/>
  <circle cx="38" cy="3" r="2" fill="#2244cc"/>
  <circle cx="58" cy="3" r="2" fill="#22cc44"/>
</svg>