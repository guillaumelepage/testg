  <line x1="40" y1="44" x2="40" y2="32" stroke="#2a1808" stroke-width="3"/>
  <line x1="52" y1="44" x2="52" y2="32" stroke="#2a1808" stroke-width="3"/>
  <line x1="64" y1="46" x2="64" y2="34" stroke="#2a1808" stroke-width="3"/>
  <!-- body -->
  <ellipse cx="44" cy="61" rx="28" ry="21" fill="#4a2a10"/>
  <ellipse cx="36" cy="54" rx="21" ry="15" fill="#5a3a18"/>
