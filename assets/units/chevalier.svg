<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96">
  <ellipse cx="52" cy="91" rx="29" ry="6" fill="#00000030"/>
  <!-- sword behind body -->
  <line x1="67" y1="27" x2="82" y2="88" stroke="#d0d0d0" stroke-width="7"/>
  <!-- crossguard -->
  <rect x="62" y="51" width="22" height="5" rx="1" fill="#ffd700"/>
  <!-- pommel -->
  <circle cx="82" cy="88" r="5" fill="#ffd700"/>
  <!-- blade shine -->
  <line x1="68" y1="27" x2="69" y2="49" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
  <!-- armoured body -->
  <rect x="31" y="30" width="35" height="44" rx="4" fill="#5878b8"/>
  <rect x="31" y="30" width="12" height="44" fill="#ffffff" opacity="0.14"/>
  <!-- chest cross -->
  <rect x="46" y="35" width="4" height="15" fill="#ffd700"/>
  <rect x="39" y="41" width="17" height="4" fill="#ffd700"/>
  <!-- waist plate -->
  <rect x="31" y="56" width="35" height="6" fill="#2a4898"/>
  <!-- great helm -->
  <circle cx="48" cy="23" r="16" fill="#8898cc"/>
  <!-- eye slit -->
  <rect x="35" y="19" width="25" height="8" rx="1" fill="#2a4898"/>
  <!-- crest -->
  <polygon points="48,0 44,10 52,10" fill="#ffd700"/>
</svg>