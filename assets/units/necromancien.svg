<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96">
  <!-- hero glow (necrotic) -->
  <circle cx="48" cy="48" r="46" fill="none" stroke="#44cc44" stroke-width="4" opacity="0.38"/>
  <ellipse cx="52" cy="91" rx="27" ry="6" fill="#00000030"/>
  <!-- bone staff -->
  <rect x="72" y="12" width="7" height="66" rx="2" fill="#b0a080"/>
  <!-- skull totem on staff -->
  <ellipse cx="75" cy="12" rx="9" ry="10" fill="#d0c090"/>
  <circle cx="71" cy="11" rx="3" ry="3" fill="#1a1a0a"/>
  <circle cx="79" cy="11" rx="3" ry="3" fill="#1a1a0a"/>
  <rect x="72" y="16" width="7" height="3" rx="1" fill="#1a1a0a" opacity="0.60"/>
  <!-- dark robe body -->
  <rect x="26" y="28" width="42" height="48" rx="8" fill="#1a2a14"/>
  <rect x="26" y="28" width="13" height="48" fill="#ffffff" opacity="0.06"/>
  <!-- robe trim (glowing green) -->
  <rect x="26" y="28" width="42" height="5" fill="#44cc44" opacity="0.55"/>
  <rect x="26" y="66" width="42" height="5" fill="#44cc44" opacity="0.40"/>
  <!-- arcane runes on robe -->
  <text x="40" y="58" font-size="18" fill="#44cc44" opacity="0.60" font-family="serif">✦</text>
  <!-- hooded skull head -->
  <ellipse cx="48" cy="20" rx="18" ry="19" fill="#1a2a14"/>
  <ellipse cx="48" cy="20" rx="18" ry="19" fill="none" stroke="#44cc44" stroke-width="2" opacity="0.65"/>
  <!-- skull face -->
  <ellipse cx="48" cy="21" rx="12" ry="13" fill="#d0c090"/>
  <!-- eye sockets -->
  <ellipse cx="43" cy="19" rx="4" ry="4" fill="#1a2a14"/>
  <ellipse cx="53" cy="19" rx="4" ry="4" fill="#1a2a14"/>
  <!-- glowing pupils -->
  <circle cx="43" cy="19" r="2" fill="#44cc44" opacity="0.90"/>
  <circle cx="53" cy="19" r="2" fill="#44cc44" opacity="0.90"/>
  <!-- nose cavity -->
  <ellipse cx="48" cy="26" rx="2" ry="2.5" fill="#1a2a14"/>
  <!-- jaw line -->
  <path d="M39,30 Q48,36 57,30" stroke="#b0a080" stroke-width="2" fill="none"/>
</svg>