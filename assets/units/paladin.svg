<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96">
  <!-- hero glow (holy light) -->
  <circle cx="48" cy="48" r="46" fill="none" stroke="#88ccff" stroke-width="4" opacity="0.45"/>
  <ellipse cx="52" cy="91" rx="29" ry="6" fill="#00000030"/>
  <!-- holy shield behind body -->
  <ellipse cx="26" cy="56" rx="16" ry="20" fill="#3a5a9a"/>
  <ellipse cx="26" cy="56" rx="16" ry="20" fill="none" stroke="#88ccff" stroke-width="2"/>
  <line x1="26" y1="36" x2="26" y2="76" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="14" y1="56" x2="38" y2="56" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- silver-blue armour body -->
  <rect x="32" y="30" width="38" height="44" rx="4" fill="#4a6a9a"/>
  <rect x="32" y="30" width="12" height="44" fill="#ffffff" opacity="0.18"/>
  <!-- shoulder plates -->
  <rect x="32" y="30" width="38" height="6" fill="#88ccff"/>
  <!-- waist plate -->
  <rect x="32" y="62" width="38" height="5" fill="#88ccff"/>
  <!-- holy cross on chest -->
  <rect x="47" y="37" width="7" height="22" fill="#ffffff" opacity="0.70"/>
  <rect x="38" y="47" width="22" height="7" fill="#ffffff" opacity="0.70"/>
  <!-- holy mace (right side) -->
  <rect x="68" y="30" width="7" height="45" rx="2" fill="#b0b0c0"/>
  <circle cx="71" cy="28" r="9" fill="#88ccff"/>
  <circle cx="71" cy="28" r="5" fill="#ffffff" opacity="0.60"/>
  <!-- great helmet -->
  <circle cx="48" cy="22" r="17" fill="#4a6a9a"/>
  <circle cx="48" cy="22" r="17" fill="none" stroke="#88ccff" stroke-width="3"/>
  <!-- visor -->
  <rect x="36" y="18" width="24" height="7" rx="1" fill="#2a3a6a"/>
  <rect x="44" y="18" width="8" height="7" fill="#88ccff" opacity="0.35"/>
  <!-- halo glow -->
  <circle cx="48" cy="6" r="7" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.55"/>
  <circle cx="48" cy="6" r="3" fill="#ffffff" opacity="0.40"/>
</svg>