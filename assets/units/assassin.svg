<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96">
  <!-- hero glow (shadow) -->
  <circle cx="48" cy="48" r="46" fill="none" stroke="#cc0044" stroke-width="4" opacity="0.40"/>
  <ellipse cx="52" cy="91" rx="24" ry="5" fill="#00000040"/>
  <!-- dual daggers -->
  <line x1="22" y1="18" x2="36" y2="50" stroke="#c0c0c0" stroke-width="5"/>
  <rect x="18" y="28" width="14" height="4" rx="1" fill="#cc0044"/>
  <line x1="72" y1="24" x2="64" y2="55" stroke="#c0c0c0" stroke-width="5"/>
  <rect x="64" y="34" width="14" height="4" rx="1" fill="#cc0044"/>
  <!-- lean dark body -->
  <rect x="30" y="32" width="34" height="42" rx="6" fill="#1a1a2a"/>
  <rect x="30" y="32" width="10" height="42" fill="#ffffff" opacity="0.08"/>
  <!-- leather straps -->
  <line x1="30" y1="42" x2="64" y2="42" stroke="#cc0044" stroke-width="2"/>
  <line x1="30" y1="55" x2="64" y2="55" stroke="#cc0044" stroke-width="2"/>
  <!-- hood / cowl -->
  <ellipse cx="48" cy="22" rx="17" ry="18" fill="#1a1a2a"/>
  <ellipse cx="48" cy="22" rx="17" ry="18" fill="none" stroke="#cc0044" stroke-width="2"/>
  <!-- face shadow -->
  <ellipse cx="48" cy="25" rx="11" ry="9" fill="#0a0a14"/>
  <!-- glowing eye slits -->
  <ellipse cx="43" cy="23" rx="4" ry="2" fill="#cc0044" opacity="0.80"/>
  <ellipse cx="53" cy="23" rx="4" ry="2" fill="#cc0044" opacity="0.80"/>
  <!-- throwing star accent -->
  <polygon points="48,5 50,11 56,11 51,15 53,21 48,17 43,21 45,15 40,11 46,11" fill="#cc0044" opacity="0.70"/>
</svg>